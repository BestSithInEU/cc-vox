name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run /voice:speak, no audio plays even though Kokoro is running."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: "Audio should play after Claude's response."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Start Kokoro: `docker run -d --name kokoro -p 32612:8880 ...`
        2. Run `claude --plugin-dir .`
        3. Send any message
        4. No audio plays
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: TTS Backend
      description: Which backend are you using?
      options:
        - auto (default)
        - kokoro
        - fish-speech
        - pocket-tts
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - WSL
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste any error output from `./scripts/say "test"` or Claude Code stderr.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Config (optional)
      description: Contents of `~/.claude/cc-vox.toml` if relevant.
      render: toml

  - type: input
    id: version
    attributes:
      label: cc-vox version
      description: Check `.claude-plugin/plugin.json` or the README.
      placeholder: "2.0.0"
