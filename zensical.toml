[project]

site_name = "cc-vox"
site_url = "https://BestSithInEU.github.io/cc-vox"
site_description = "Give Claude Code a voice — spoken summaries after every response"
site_author = "Batuhan Edguer"

repo_url = "https://github.com/BestSithInEU/cc-vox"
repo_name = "BestSithInEU/cc-vox"
edit_uri = "edit/main/docs/"

copyright = "Copyright &copy; 2026 Batuhan Edgüer"

extra_css = ["stylesheets/hero.css"]

nav = [
  { Home = "index.md" },
  { "Getting Started" = [
    { Installation = "getting-started/installation.md" },
    { Backends = "getting-started/backends.md" },
    { Configuration = "getting-started/configuration.md" },
  ] },
  { Usage = [
    { "How It Works" = "usage/how-it-works.md" },
    { "Slash Commands" = "usage/slash-commands.md" },
    { Voices = "usage/voices.md" },
  ] },
  { Architecture = [
    { Overview = "architecture/overview.md" },
    { "Hook System" = "architecture/hooks.md" },
    { "TTS Backends" = "architecture/tts-backends.md" },
    { "Project Structure" = "architecture/project-structure.md" },
  ] },
  { Development = [
    { Contributing = "development/contributing.md" },
    { "Adding a Backend" = "development/adding-backends.md" },
  ] },
  { Reference = [
    { Configuration = "reference/configuration.md" },
    { "Python API" = "reference/api.md" },
    { "Environment Variables" = "reference/environment.md" },
  ] },
  { FAQ = "faq.md" },
]

# Theme

[project.theme]

logo = "assets/logo-nav.svg"
favicon = "assets/logo-nav.svg"

features = [
  "content.code.annotate",
  "content.code.copy",
  "content.tabs.link",
  "navigation.expand",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "search.share",
  "toc.follow",
]

# Dark mode first (default)
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Social

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/BestSithInEU/cc-vox"

# Markdown extensions

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.betterem"]
smart_enable = "all"

[project.markdown_extensions."pymdownx.caret"]
[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions."pymdownx.inlinehilite"]
[project.markdown_extensions."pymdownx.keys"]
[project.markdown_extensions."pymdownx.mark"]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions."pymdownx.smartsymbols"]
[project.markdown_extensions."pymdownx.snippets"]

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [{ name = "mermaid", class = "mermaid" }]

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown_extensions."pymdownx.tilde"]
