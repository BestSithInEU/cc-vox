<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" fill="none">
  <defs>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-text" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Ambient glow behind waveform -->
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" />
    </filter>

    <linearGradient id="neon-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8176D" />
      <stop offset="100%" stop-color="#C4156A" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00A5C4" />
      <stop offset="100%" stop-color="#0090AA" />
    </linearGradient>
    <linearGradient id="text-vox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D61368" />
      <stop offset="50%" stop-color="#7B2FC9" />
      <stop offset="100%" stop-color="#0090AA" />
    </linearGradient>
    <linearGradient id="tagline-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4156A" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0090AA" stop-opacity="0.65" />
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8176D" stop-opacity="0" />
      <stop offset="15%" stop-color="#E8176D" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#7B2FC9" stop-opacity="0.25" />
      <stop offset="85%" stop-color="#00A5C4" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00A5C4" stop-opacity="0" />
    </linearGradient>

    <style>
      .p1 { animation: pulse1 2.4s ease-in-out infinite; transform-origin: 32.75px 71px; }
      .p2 { animation: pulse2 2.4s ease-in-out infinite 0.2s; transform-origin: 55.75px 69px; }
      .p3 { animation: pulse3 2.4s ease-in-out infinite 0.4s; transform-origin: 78.75px 69px; }
      .p4 { animation: pulse4 2.4s ease-in-out infinite 0.6s; transform-origin: 101.75px 69px; }
      .p5 { animation: pulse5 2.4s ease-in-out infinite 0.8s; transform-origin: 124.75px 71px; }
      .c1 { animation: pulse6 2.4s ease-in-out infinite 0.3s; transform-origin: 44.25px 69px; }
      .c2 { animation: pulse7 2.4s ease-in-out infinite 0.5s; transform-origin: 67.25px 69px; }
      .c3 { animation: pulse8 2.4s ease-in-out infinite 0.1s; transform-origin: 90.25px 69px; }
      .c4 { animation: pulse9 2.4s ease-in-out infinite 0.7s; transform-origin: 113.25px 69px; }
      .horizon-line { animation: breathe 3s ease-in-out infinite; }
      .ambient-glow { animation: ambientPulse 4s ease-in-out infinite; }

      @keyframes pulse1 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.5); } }
      @keyframes pulse2 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.6); } }
      @keyframes pulse3 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.75); } }
      @keyframes pulse4 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.3); } }
      @keyframes pulse5 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.7); } }
      @keyframes pulse6 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.4); } }
      @keyframes pulse7 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.65); } }
      @keyframes pulse8 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.35); } }
      @keyframes pulse9 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.55); } }
      @keyframes breathe { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
      @keyframes ambientPulse { 0%,100% { opacity: 0.15; } 50% { opacity: 0.25; } }
    </style>

    <clipPath id="typewriter-clip">
      <rect x="150" y="108" width="0" height="20">
        <animate attributeName="width" from="0" to="347" dur="2.5s" begin="0.5s" fill="freeze"
          calcMode="linear" />
      </rect>
    </clipPath>
  </defs>

  <!-- Horizon line -->
  <rect class="horizon-line" x="10" y="103" width="500" height="1.2" fill="url(#horizon)" />

  <!-- Waveform reflection (very subtle for light mode) -->
  <g opacity="0.08" transform="translate(0, 206) scale(1, -1)">
    <rect x="30" y="58" width="5.5" height="26" rx="2.75" fill="url(#neon-pink)" opacity="0.35" />
    <rect x="53" y="30" width="5.5" height="78" rx="2.75" fill="url(#neon-pink)" opacity="0.65" />
    <rect x="76" y="20" width="5.5" height="98" rx="2.75" fill="url(#neon-pink)" />
    <rect x="99" y="28" width="5.5" height="82" rx="2.75" fill="url(#neon-pink)" opacity="0.65" />
    <rect x="122" y="56" width="5.5" height="30" rx="2.75" fill="url(#neon-pink)" opacity="0.35" />
    <rect x="41.5" y="44" width="5.5" height="50" rx="2.75" fill="url(#neon-cyan)" opacity="0.45" />
    <rect x="64.5" y="36" width="5.5" height="66" rx="2.75" fill="url(#neon-cyan)" opacity="0.8" />
    <rect x="87.5" y="32" width="5.5" height="74" rx="2.75" fill="url(#neon-cyan)" opacity="0.8" />
    <rect x="110.5" y="42" width="5.5" height="54" rx="2.75" fill="url(#neon-cyan)" opacity="0.45" />
  </g>

  <!-- Waveform — pink bars -->
  <g>
    <rect class="p1" x="30" y="58" width="5.5" height="26" rx="2.75" fill="url(#neon-pink)"
      opacity="0.35" />
    <rect class="p2" x="53" y="30" width="5.5" height="78" rx="2.75" fill="url(#neon-pink)"
      opacity="0.65" />
    <rect class="p3" x="76" y="20" width="5.5" height="98" rx="2.75" fill="url(#neon-pink)" />
    <rect class="p4" x="99" y="28" width="5.5" height="82" rx="2.75" fill="url(#neon-pink)"
      opacity="0.65" />
    <rect class="p5" x="122" y="56" width="5.5" height="30" rx="2.75" fill="url(#neon-pink)"
      opacity="0.35" />
  </g>

  <!-- Waveform — cyan bars (interleaved) -->
  <g>
    <rect class="c1" x="41.5" y="44" width="5.5" height="50" rx="2.75" fill="url(#neon-cyan)"
      opacity="0.45" />
    <rect class="c2" x="64.5" y="36" width="5.5" height="66" rx="2.75" fill="url(#neon-cyan)"
      opacity="0.8" />
    <rect class="c3" x="87.5" y="32" width="5.5" height="74" rx="2.75" fill="url(#neon-cyan)"
      opacity="0.8" />
    <rect class="c4" x="110.5" y="42" width="5.5" height="54" rx="2.75" fill="url(#neon-cyan)"
      opacity="0.45" />
  </g>

  <!-- cc-vox text -->
  <text y="92" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace"
    font-size="62" font-weight="700" letter-spacing="-1">
    <tspan x="152" fill="#1E293B">cc</tspan>
    <tspan fill="#A0AEC0">-</tspan>
    <tspan fill="url(#text-vox)">vox</tspan>
  </text>

  <!-- Tagline with typewriter reveal -->
  <g clip-path="url(#typewriter-clip)">
    <text x="155" y="122" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="13"
      fill="url(#tagline-grad)" letter-spacing="3.5">VOICE FEEDBACK FOR CLAUDE CODE</text>
  </g>

  <!-- Typing cursor — follows typewriter, blinks forever -->
  <rect x="150" y="110" width="2" height="14" rx="1" fill="#0090AA" opacity="0">
    <!-- Move with typewriter -->
    <animate attributeName="x" from="150" to="497" dur="2.5s" begin="0.5s" fill="freeze"
      calcMode="linear" />
    <!-- Appear when typing starts -->
    <set attributeName="opacity" to="0.8" begin="0.5s" />
    <!-- Blink forever (0.5s on, 0.5s off) -->
    <animate attributeName="opacity" values="0.8;0.8;0;0;0.8" keyTimes="0;0.45;0.5;0.95;1"
      dur="1s" begin="0.5s" repeatCount="indefinite" />
  </rect>
</svg>