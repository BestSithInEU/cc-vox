<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" fill="none">
  <defs>
    <filter id="gl" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b" />
      <feComposite in="SourceGraphic" in2="b" operator="over" />
    </filter>
    <style>
      .section-title { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; font-weight:
      700; letter-spacing: 1px; }
      .file-name { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; font-weight: 600;
      }
      .file-desc { font-family: 'Inter',system-ui,sans-serif; font-size: 10px; fill: #9CA3AF; }
      .num { font-family: 'SF Mono',monospace; font-size: 9px; font-weight: 700; }
      .conn { stroke-width: 1.5; fill: none; }
    </style>
    <marker id="a" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="10" markerHeight="8"
      orient="auto">
      <path d="M 1 1 L 10 4 L 1 7" stroke="#D97706" stroke-width="1.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="380" rx="16" fill="#0D1117" />

  <!-- ═══ HOOKS column ═══ -->
  <rect x="20" y="20" width="310" height="320" rx="14" fill="#0F172A" stroke="#1E293B"
    stroke-width="1" />
  <text class="section-title" x="40" y="44" fill="#94A3B8">HOOKS</text>

  <!-- 1. UserPromptSubmit -->
  <rect x="34" y="60" width="282" height="52" rx="8" fill="#1E1338" stroke="#7C3AED"
    stroke-width="1" />
  <circle cx="50" cy="80" r="10" fill="#7C3AED" opacity="0.3" />
  <text class="num" x="46" y="84" fill="#C4B5FD">1</text>
  <text class="file-name" x="68" y="78" fill="#C4B5FD">user_prompt_submit_hook.py</text>
  <text class="file-desc" x="68" y="94">Injects 📢 reminder at turn start</text>

  <!-- 2. PostToolUse -->
  <rect x="34" y="122" width="282" height="52" rx="8" fill="#1E1338" stroke="#7C3AED"
    stroke-width="1" opacity="0.8" />
  <circle cx="50" cy="142" r="10" fill="#7C3AED" opacity="0.3" />
  <text class="num" x="46" y="146" fill="#C4B5FD">2</text>
  <text class="file-name" x="68" y="140" fill="#C4B5FD">post_tool_use_hook.py</text>
  <text class="file-desc" x="68" y="156">Brief nudge after tool calls</text>

  <!-- 3. Stop -->
  <rect x="34" y="184" width="282" height="52" rx="8" fill="#271A0A" stroke="#D97706"
    stroke-width="1" />
  <circle cx="50" cy="204" r="10" fill="#D97706" opacity="0.3" />
  <text class="num" x="46" y="208" fill="#FCD34D">3</text>
  <text class="file-name" x="68" y="202" fill="#FCD34D">stop_hook.py</text>
  <text class="file-desc" x="68" y="218">Extracts 📢 summary → calls say</text>

  <!-- Shared module -->
  <rect x="34" y="250" width="282" height="42" rx="8" fill="#111827" stroke="#374151"
    stroke-width="1" stroke-dasharray="4,3" />
  <text class="file-name" x="50" y="270" fill="#6B7280">voice_common.py</text>
  <text class="file-desc" x="196" y="270" fill="#4B5563">shared config &amp; utils</text>

  <!-- hooks.json -->
  <rect x="34" y="300" width="130" height="22" rx="4" fill="#111827" stroke="#374151"
    stroke-width="0.8" />
  <text class="file-name" x="46" y="315" fill="#4B5563" font-size="10">hooks.json</text>

  <!-- ═══ Arrow: Stop → say ═══ -->
  <path d="M334 210 L365 210" stroke="#D97706" stroke-width="1.5" marker-end="url(#a)" class="conn" />

  <!-- ═══ SCRIPTS column ═══ -->
  <rect x="370" y="20" width="210" height="160" rx="14" fill="#0F172A" stroke="#1E293B"
    stroke-width="1" />
  <text class="section-title" x="390" y="44" fill="#94A3B8">SCRIPTS</text>

  <!-- say -->
  <rect x="384" y="60" width="182" height="106" rx="8" fill="#0A1E14" stroke="#10B981"
    stroke-width="1" />
  <text class="file-name" x="400" y="80" fill="#34D399" filter="url(#gl)">say</text>
  <text class="file-desc" x="400" y="98" fill="#6EE7B7">Multi-backend TTS router</text>
  <!-- Backend mini-tags -->
  <rect x="400" y="110" width="60" height="16" rx="4" fill="#F59E0B" opacity="0.15" />
  <text x="408" y="122" font-family="monospace" font-size="9" fill="#FBBF24">fish 🐟</text>
  <rect x="466" y="110" width="56" height="16" rx="4" fill="#3B82F6" opacity="0.15" />
  <text x="473" y="122" font-family="monospace" font-size="9" fill="#60A5FA">kokoro</text>
  <rect x="400" y="132" width="56" height="16" rx="4" fill="#10B981" opacity="0.15" />
  <text x="408" y="144" font-family="monospace" font-size="9" fill="#34D399">pocket</text>

  <!-- ═══ COMMANDS column ═══ -->
  <rect x="370" y="200" width="210" height="80" rx="14" fill="#0F172A" stroke="#1E293B"
    stroke-width="1" />
  <text class="section-title" x="390" y="224" fill="#94A3B8">COMMANDS</text>

  <rect x="384" y="234" width="182" height="34" rx="8" fill="#1A1032" stroke="#8B5CF6"
    stroke-width="0.8" />
  <text class="file-name" x="400" y="254" fill="#A78BFA">speak.md</text>
  <text class="file-desc" x="475" y="254">/voice:speak</text>

  <!-- ═══ CONFIG column ═══ -->
  <rect x="600" y="20" width="220" height="270" rx="14" fill="#0F172A" stroke="#1E293B"
    stroke-width="1" />
  <text class="section-title" x="620" y="44" fill="#94A3B8">CONFIG</text>

  <!-- plugin.json -->
  <rect x="614" y="60" width="192" height="38" rx="8" fill="#111827" stroke="#374151"
    stroke-width="1" />
  <text class="file-name" x="630" y="78" fill="#94A3B8">plugin.json</text>
  <text class="file-desc" x="630" y="90">v2.0.0 manifest</text>

  <!-- marketplace.json -->
  <rect x="614" y="108" width="192" height="38" rx="8" fill="#111827" stroke="#374151"
    stroke-width="1" />
  <text class="file-name" x="630" y="126" fill="#94A3B8">marketplace.json</text>
  <text class="file-desc" x="630" y="138">distribution metadata</text>

  <!-- cc-vox.toml -->
  <rect x="614" y="160" width="192" height="64" rx="8" fill="#1A0E26" stroke="#A855F7"
    stroke-width="1" stroke-dasharray="4,3" />
  <text class="file-name" x="630" y="182" fill="#C084FC" font-size="10">~/.claude/cc-vox.toml</text>
  <text class="file-desc" x="630" y="198" fill="#A78BFA">user config (voice, backend,</text>
  <text class="file-desc" x="630" y="210" fill="#A78BFA">speed, prompt, enabled)</text>

  <!-- Pipeline label at bottom -->
  <text x="410" y="350" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#4B5563"
    letter-spacing="0.5">Pipeline: <tspan fill="#C4B5FD">①</tspan> inject → <tspan fill="#C4B5FD">②</tspan>
    nudge → <tspan fill="#FCD34D">③</tspan> extract → <tspan fill="#34D399">say</tspan> → <tspan
      fill="#60A5FA">🔊</tspan></text>
</svg>