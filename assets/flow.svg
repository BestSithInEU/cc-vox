<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" fill="none">
  <defs>
    <style>
      .box { rx: 10; ry: 10; }
      .label { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; font-weight: 600;
      text-anchor: middle; }
      .sub { font-family: 'Inter',system-ui,sans-serif; font-size: 10.5px; text-anchor: middle;
      opacity: 0.85; }
      .arrow { stroke: #6B7280; stroke-width: 1.6; fill: none; marker-end: url(#ah); }
      .arrow-label { font-family: 'Inter',system-ui,sans-serif; font-size: 9.5px; fill: #9CA3AF;
      text-anchor: middle; }
      .backend-box { rx: 8; ry: 8; }
      .backend-label { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; font-weight:
      600; text-anchor: middle; }
      .backend-sub { font-family: 'Inter',system-ui,sans-serif; font-size: 9.5px; text-anchor:
      middle; opacity: 0.7; }
    </style>
    <marker id="ah" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="10" markerHeight="8"
      orient="auto-start-reverse">
      <path d="M 1 1 L 10 4 L 1 7" stroke="#6B7280" stroke-width="1.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="300" rx="16" fill="#0D1117" />

  <!-- Row 1: Main pipeline -->

  <!-- 1. You chat -->
  <rect class="box" x="30" y="50" width="130" height="56" fill="#7C3AED" />
  <text class="label" x="95" y="75" fill="#fff">You chat</text>
  <text class="sub" x="95" y="90" fill="#E9D5FF">with Claude</text>

  <!-- Arrow 1→2 -->
  <line class="arrow" x1="168" y1="78" x2="200" y2="78" />

  <!-- 2. Claude responds -->
  <rect class="box" x="212" y="50" width="150" height="56" fill="#2563EB" />
  <text class="label" x="287" y="72" fill="#fff">Claude responds</text>
  <text class="sub" x="287" y="88" fill="#BFDBFE">+ adds 📢 summary</text>

  <!-- Arrow 2→3 -->
  <line class="arrow" x1="370" y1="78" x2="402" y2="78" />

  <!-- 3. Stop hook -->
  <rect class="box" x="414" y="50" width="140" height="56" fill="#D97706" />
  <text class="label" x="484" y="72" fill="#fff">Stop hook</text>
  <text class="sub" x="484" y="88" fill="#FEF3C7">extracts 📢 text</text>

  <!-- Arrow 3→4 -->
  <line class="arrow" x1="562" y1="78" x2="594" y2="78" />

  <!-- 4. say script -->
  <rect class="box" x="606" y="46" width="140" height="64" fill="#1F2937" stroke="#4B5563"
    stroke-width="1" />
  <text class="label" x="676" y="72" fill="#E5E7EB">say script</text>
  <text class="sub" x="676" y="88" fill="#9CA3AF">auto-detects backend</text>

  <!-- Arrow down to backends -->
  <line x1="642" y1="114" x2="642" y2="150" stroke="#4B5563" stroke-width="1.5"
    stroke-dasharray="5,4" />
  <line x1="676" y1="114" x2="676" y2="150" stroke="#4B5563" stroke-width="1.5"
    stroke-dasharray="5,4" />
  <line x1="710" y1="114" x2="710" y2="150" stroke="#4B5563" stroke-width="1.5"
    stroke-dasharray="5,4" />

  <!-- Backend container -->
  <rect x="596" y="140" width="238" height="78" rx="12" fill="#111827" stroke="#1E293B"
    stroke-width="1" />

  <!-- Fish Speech -->
  <rect class="backend-box" x="608" y="154" width="66" height="48" fill="#FEF3C7" stroke="#F59E0B"
    stroke-width="1.2" />
  <text class="backend-label" x="641" y="173" fill="#92400E">🐟 Fish</text>
  <text class="backend-sub" x="641" y="190" fill="#92400E">:32611</text>

  <!-- Kokoro -->
  <rect class="backend-box" x="682" y="154" width="66" height="48" fill="#DBEAFE" stroke="#3B82F6"
    stroke-width="1.2" />
  <text class="backend-label" x="715" y="173" fill="#1E40AF">🗣 Kokoro</text>
  <text class="backend-sub" x="715" y="190" fill="#1E40AF">:32612</text>

  <!-- pocket-tts -->
  <rect class="backend-box" x="756" y="154" width="66" height="48" fill="#D1FAE5" stroke="#10B981"
    stroke-width="1.2" />
  <text class="backend-label" x="789" y="173" fill="#065F46">📦 pocket</text>
  <text class="backend-sub" x="789" y="190" fill="#065F46">:8000</text>

  <!-- Arrows from backends to output -->
  <line x1="641" y1="206" x2="641" y2="226" stroke="#4B5563" stroke-width="1.2"
    stroke-dasharray="4,3" />
  <line x1="715" y1="206" x2="715" y2="226" stroke="#4B5563" stroke-width="1.2"
    stroke-dasharray="4,3" />
  <line x1="789" y1="206" x2="789" y2="226" stroke="#4B5563" stroke-width="1.2"
    stroke-dasharray="4,3" />

  <!-- Converge line -->
  <line x1="641" y1="226" x2="789" y2="226" stroke="#4B5563" stroke-width="1.2" />
  <line x1="715" y1="226" x2="715" y2="240" stroke="#4B5563" stroke-width="1.8" />

  <!-- 5. You hear it -->
  <rect class="box" x="660" y="242" width="116" height="36" fill="#059669" />
  <text class="label" x="718" y="265" fill="#fff">🔊 You hear it</text>

  <!-- Labels on dash lines -->
  <text class="arrow-label" x="626" y="148" fill="#F59E0B">GPU idle</text>
  <text class="arrow-label" x="696" y="148" fill="#3B82F6">default</text>
  <text class="arrow-label" x="768" y="148" fill="#10B981">fallback</text>
</svg>